<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Logs</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

nav{
    background:#1e293b;
    padding:20px;
    text-align:center;
}

nav h1{
    color:#38bdf8;
}

.container{
    width:90%;
    margin:40px auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#38bdf8;
    color:black;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #334155;
}

.safe{
    color:#22c55e;
    font-weight:bold;
}

.danger{
    color:#ef4444;
    font-weight:bold;
}

tr:hover{
    background:#334155;
}
</style>
</head>

<body>

<nav>
    <h1>Detection Logs</h1>
</nav>

<div class="container">

    <div class="card">
        <h2>Total Log Entries: {{ logs|length }}</h2>
    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>SSID</th>
                    <th>BSSID</th>
                    <th>Signal</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

            {% for log in logs %}

            <tr>

                <td>{{ log.ssid }}</td>
                <td>{{ log.bssid }}</td>
                <td>{{ log.signal }} dBm</td>

                <td>
                    {% if log.status == "Suspicious" %}
                        <span class="danger">
                            ⚠ Suspicious
                        </span>
                    {% else %}
                        <span class="safe">
                            ✓ Safe
                        </span>
                    {% endif %}
                </td>

            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
